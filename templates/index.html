<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FreshGuard AI</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <header>
        <h1>🍎 FreshGuard AI</h1>
        <p>AI Powered Food Quality Detection using CNN</p>
    </header>

    <main>

        <section>

            <h2>Upload Image</h2>

            <form action="/predict" method="POST" enctype="multipart/form-data">

                <input type="file" name="image" id="imageInput" required>

                <br><br>

                <img id="preview" src="" alt="Image Preview">

                <br><br>

                <button type="submit" id="predictBtn">
                    Predict
                </button>

                <div id="loading" style="display:none; margin-top:20px;">

                    <h3>🤖 FreshGuard AI is analyzing...</h3>

                    <p>Please wait a few seconds.</p>

                </div>

            </form>

        </section>

        <section>

            <h2>Prediction Result</h2>

            <p>No prediction yet.</p>

        </section>

    </main>

    <footer>

        <p>© 2026 FreshGuard AI</p>

    </footer>

    <!-- JavaScript should be here -->
    <script>

        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");
        const form = document.querySelector("form");
        const loading = document.getElementById("loading");
        const predictBtn = document.getElementById("predictBtn");

        // Image Preview
        imageInput.addEventListener("change", function () {

            const file = this.files[0];

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }

        });

        // Loading Animation
        form.addEventListener("submit", function () {

            loading.style.display = "block";
            predictBtn.disabled = true;
            predictBtn.innerHTML = "Analyzing...";

        });

    </script>

</body>
</html>
